<div class="dialogo">
  <h2 class="dialogo-titulo">{{ data.titulo }}</h2>
  <p class="dialogo-mensagem">{{ data.mensagem }}</p>

  <div class="dialogo-acoes">
    <button mat-stroked-button (click)="cancelar()">Voltar</button>
    <button
      mat-flat-button
      [class.btn-warn]="data.corBotaoConfirmar === 'warn'"
      [class.btn-primary]="data.corBotaoConfirmar !== 'warn'"
      (click)="confirmar()"
    >
      {{ data.textoBotaoConfirmar }}
    </button>
  </div>
</div>
